<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" fill="white" />

  <!-- Main planning board shape with subtle rounded corners -->
  <g filter="url(#shadow)">
    <!-- Outer frame -->
    <rect x="32" y="32" width="192" height="192" rx="24" ry="24" fill="url(#grad1)" />

    <!-- Inner content area with grid lines -->
    <rect x="44" y="56" width="168" height="144" rx="16" ry="16" fill="rgba(255,255,255,0.95)" />

    <!-- Minimalist grid pattern (planning board lines) -->
    <!-- Vertical lines -->
    <line x1="74" y1="68" x2="74" y2="188" stroke="#e5e7eb" stroke-width="2" />
    <line x1="110" y1="68" x2="110" y2="188" stroke="#e5e7eb" stroke-width="2" />
    <line x1="146" y1="68" x2="146" y2="188" stroke="#e5e7eb" stroke-width="2" />
    <line x1="182" y1="68" x2="182" y2="188" stroke="#e5e7eb" stroke-width="2" />

    <!-- Horizontal lines -->
    <line x1="44" y1="96" x2="212" y2="96" stroke="#e5e7eb" stroke-width="2" />
    <line x1="44" y1="124" x2="212" y2="124" stroke="#e5e7eb" stroke-width="2" />
    <line x1="44" y1="152" x2="212" y2="152" stroke="#e5e7eb" stroke-width="2" />

    <!-- Accent dots representing tasks/items (Apple-style minimalism) -->
    <circle cx="62" cy="80" r="4" fill="#2563eb" opacity="0.8" />
    <circle cx="98" cy="80" r="4" fill="#2563eb" opacity="0.6" />
    <circle cx="134" cy="80" r="4" fill="#2563eb" opacity="0.7" />

    <circle cx="62" cy="108" r="4" fill="#3b82f6" opacity="0.7" />
    <circle cx="170" cy="108" r="4" fill="#3b82f6" opacity="0.5" />

    <circle cx="98" cy="136" r="4" fill="#2563eb" opacity="0.6" />
    <circle cx="170" cy="136" r="4" fill="#2563eb" opacity="0.8" />

    <circle cx="62" cy="164" r="4" fill="#3b82f6" opacity="0.7" />
    <circle cx="134" cy="164" r="4" fill="#3b82f6" opacity="0.5" />
  </g>
</svg>
