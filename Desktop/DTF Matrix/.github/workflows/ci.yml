name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    name: Backend (Lint + Test)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('oms-api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: oms-api
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: oms-api
        run: ruff check . --config pyproject.toml

      - name: Run pytest
        working-directory: oms-api
        run: pytest -q
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          AUTO_CREATE_TABLES: "True"

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend (Build + Type Check)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: oms-frontend/package-lock.json

      - name: Install dependencies
        working-directory: oms-frontend
        run: npm ci

      - name: Build
        working-directory: oms-frontend
        run: npm run build

      - name: Type check
        working-directory: oms-frontend
        run: npx tsc -b --noEmit

  e2e-playwright:
    runs-on: ubuntu-latest
    name: E2E Tests (${{ matrix.browser }})
    needs: [backend-lint-test, frontend-build]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit, msedge]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: oms-frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('oms-api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}

      - name: Install Python dependencies
        working-directory: oms-api
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        working-directory: oms-frontend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Build frontend
        working-directory: oms-frontend
        run: npm run build

      - name: Start FastAPI server
        working-directory: oms-api
        run: |
          nohup uvicorn app.main:app --port 8000 > api.log 2>&1 &
          sleep 3
          curl -f http://localhost:8000/health || (cat api.log && exit 1)
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          AUTO_CREATE_TABLES: "True"

      - name: Start frontend server
        working-directory: oms-frontend
        run: |
          nohup npx serve -l 5173 dist > frontend.log 2>&1 &
          sleep 2

      - name: Wait for servers
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'
          timeout 30 bash -c 'until curl -f http://localhost:5173; do sleep 1; done'

      - name: Run Playwright tests
        working-directory: oms-frontend
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          VITE_API_URL: http://localhost:8000
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: oms-frontend/playwright-report/
          retention-days: 7
