name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        run: echo "should_deploy=true" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    name: Deploy Backend to Railway
    needs: deploy-check
    if: needs.deploy-check.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: oms-api
          working-directory: oms-api

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Railway
    needs: deploy-check
    if: needs.deploy-check.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: oms-frontend/package-lock.json

      - name: Install dependencies
        working-directory: oms-frontend
        run: npm ci

      - name: Build
        working-directory: oms-frontend
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
        run: npm run build

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: oms-frontend
          working-directory: oms-frontend
