services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oms}
      POSTGRES_DB: ${POSTGRES_DB:-oms}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oms} -d ${POSTGRES_DB:-oms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://oms:oms@db:5432/oms}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-15}"
      REFRESH_TOKEN_EXPIRE_DAYS: "${REFRESH_TOKEN_EXPIRE_DAYS:-7}"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SUPPLIER_MOCKUPS_PATH: /mockups
    ports:
      - "8000:8000"
    volumes:
      - "../Mokeup fournisseur uniforme:/mockups:ro"

volumes:
  pgdata:
